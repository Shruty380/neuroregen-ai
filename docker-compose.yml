version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuroregen_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/neuroregen.db:/app/neuroregen.db
    environment:
      - DATABASE_URL=sqlite:///./neuroregen.db
      - NCBI_EMAIL=shruty1522@gmail.com
      - DEBUG=False
      - ENVIRONMENT=production
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neuroregen_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped